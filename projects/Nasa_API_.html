<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nasa</title>
  <style>
 body {
  background: 
    linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
    url('https://www.nasa.gov/wp-content/uploads/2025/08/hubble-30dor-potw2531a-1.jpg');
  background-size: cover;
  background-position: center;
  color: white;
}
    .image{
      margin-left: 500px;
      margin-top: 30px;
      border-radius: 20px;
      width: 400px;
    }
    h1{
      margin-left: 550px;
    }
    #date{
      margin-left: 540px;
      padding: 15px;
      border-radius: 20px;
      background-color: rgba(116, 146, 136, 0.436);
      border: none;
      box-shadow: 0 0 8px rgb(232, 5, 134);
      font-size: 20px;
    }
    #date:hover{
      background-color: rgba(121, 231, 11, 0.727);
    }
    #btn{
      padding: 15px;
      border-radius: 20px;
      border: none;
      background-color: rgba(13, 192, 232, 0.29);
      font-size: 20px;
      margin-left: 20px;
      box-shadow: 0 0 10px rgb(225, 8, 225);
      color: aliceblue;
    }
    #btn:hover{
    background-color: rgb(121, 5, 237);
    }
    h2{
    margin-left: 500px;
    color: red;
    }
    p{
      color: rgb(222, 208, 18);
    }
  </style>
</head>
<body>
  <h1>NASA Photo Gallary</h1>
  <input type="date" id="date" />
  <button id="btn">Click</button>
  <div id="result"></div>

  <script>
    let date = document.getElementById("date");
    let btn = document.getElementById("btn");
    let result = document.getElementById("result");

    btn.addEventListener("click", () => {
      let selectedDate = date.value;

      if (!selectedDate) {
        alert("Please select a date");
        return;
      }

      let url = `https://api.nasa.gov/planetary/apod?api_key=UNGNMyzv4UC2reFKnyKBCCVl8jTi2SdhaNncyS7U&date=${selectedDate}`;

      fetch(url)
        .then(response => response.json())
        .then(data => {
          console.log(data);

          result.innerHTML = ""; 

          if (data.media_type === "image") {
            let img = document.createElement("img");
            img.classList.add("image")
            img.src = data.url;
            result.appendChild(img);
          }

          let title = document.createElement("h2");
          title.textContent = data.title;

          let explanation = document.createElement("p");
          explanation.textContent = data.explanation;

          result.append(title, explanation);
        })
        .catch(err => {
          console.error(err);
          result.textContent = "Error fetching NASA data";
        });
    });
  </script>
</body>
</html>
