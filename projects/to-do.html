<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgba(128, 128, 128, 0.247);
        }
        div{
            background-color: aliceblue;
            width: 80vh;
            height: 60vh;
            margin-left: 75vh;  
        }
        h2{
            color: #6a4ce3;
            padding: 20px;
            font-size: 30px;
        }
        input{
            border: none;
            box-shadow:0px 0px 1px 0px rgb(66, 67, 68);
        }
         button {
            background-color: #6a4ce3;
            border-radius: 10px;
            width: 60px;
            height: 50px;
            color:aliceblue;
        }

    </style>
</head>
<body>

    <script>
        
        let div = document.createElement("div")
        document.body.append(div)
        div.style.textAlign = "center"
        div.style.marginTop = "100px";

        let title = document.createElement("h2")
        title.textContent = "My-To-Do list";
        div.append(title)

        let input = document.createElement("input")
        input.setAttribute("type", "text");
        input.setAttribute("placeholder", "Enter a task")
        input.style.padding = "15px"
        input.style.width = "200px"
        div.append(input)

        let btn = document.createElement("button")
        btn.textContent = "Add"
        btn.style.padding = "15px"
        btn.style.marginLeft = "12px"
        btn.style.border="none"
        div.append(btn)

        let ul = document.createElement("ul")
        ul.style.listStyleType = "none"
        ul.style.marginTop = "20px";
        ul.style.width = "170px"
        ul.style.display = "flex";
        ul.style.flexDirection = "column";
        ul.style.gap = "5px";
        ul.style.marginLeft = "85px"
        div.append(ul)

        btn.addEventListener("click", () => {
            let task = input.value.trim();

            let li = document.createElement("li")
            li.textContent = task
            li.style.borderRadius = "20px"
            li.style.marginTop = "10px"
            li.style.minWidth = "250px"
            li.style.display = "block";
            li.style.marginTop = "10px";
            li.style.backgroundColor = "white";
            li.style.boxShadow = "0 0 5px gray";
          
            let doneBtn = document.createElement("button");
            doneBtn.textContent = "✅";             // checkmark emoji
            doneBtn.style.marginLeft = "10px";
            doneBtn.style.cursor = "pointer";
            doneBtn.style.border = "none";
            doneBtn.style.borderRadius = "4px";
            doneBtn.style.padding = "4px 6px";
            doneBtn.style.backgroundColor = " rgb(15, 167, 25)";
            doneBtn.addEventListener("click", () => {
            li.style.textDecoration = "line-through";
            li.style.color = "gray";                    
            });

            let delBtn = document.createElement("button");
            delBtn.textContent = "🗑️";
            delBtn.style.marginLeft = "20px";
            delBtn.style.cursor = "pointer";
            delBtn.style.border = "none";
            delBtn.style.backgroundColor = "#f8d7da";
            delBtn.style.borderRadius = "4px";
            delBtn.style.padding = "4px 6px";

            delBtn.addEventListener("click", () => {
            li.remove();  
            });

            li.append(doneBtn)
            li.append(delBtn)
            ul.append(li)

            input.value = ""

        });
    </script>
</body>

</html>
