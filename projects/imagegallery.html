<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Search</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #9afff8, #2ddc06);
      }

    header {
      margin: 20px;
    }

    input {
      padding: 10px;
      font-size: 16px;
      border-radius: 10px;
      text-align: center;      
      color:rgba(0, 0, 0, 0.719);
      background-color:magenta;
      border: 3px solid red;
    }
    input:hover{
      background-color:skyblue;
    }
    #btn {
      padding: 10px;
      font-size: 17px;
      cursor: pointer;
      margin-left: 20px;
      background-color: magenta;
      border: 3px solid red;
      border-radius: 10px;
      color: gainsboro;
    }
     #btn:hover{
      background-color: rgba(183, 255, 0, 0.84);
      transform:scalex(1.5);
      color:black;
      
     }
    #images img {
      width: 200px;
      margin: 10px;
      border-radius: 20px;
      cursor: pointer;
      transition: transform 0.4s;
    }

    #images img:hover {
      transform: scale(1.05);
      transform: scalex(1.5);
    }
    #p1 {
      display: none;
      position: fixed;
      top:0;
      left:0;
      width: 100%;
      height: 100%;
      background-color: rgba(9, 205, 179, 0.795);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 20000;
      margin-right: 50px;
     
    }
    #p2 {
      max-width: 70vh;
      max-height: 70vh;
      border-radius: 10px;
    }
    #btn1{
      margin: 40px;
      padding: 20px;
      border: none;
    background-color: rgb(206, 5, 241);
    border-radius: 10px;
    text-align: center;
    color: aliceblue;
    position: relative;
    top: 301vh;
    margin-left: 90vh;

    }
  </style>
</head>
<body>

  <header>
    <h1>Search for all Images</h1>
    <form id="form">
      <input type="text" id="search" placeholder="Search for images" required />
      <button type="submit" id="btn">Search</button>
      <button id="btn1" style="display: none;">Loading.....</button>
    </form>
  </header>

  <div id="images"></div>
  <div id="p1">
  <img id="p2" src="" alt="">
  </div>


  <script>
    let search = document.getElementById("search");
    let form = document.getElementById("form");
    let images = document.getElementById("images");
    let p1 = document.getElementById("p1");
    let p2 = document.getElementById("p2");
    let btn=document.getElementById("btn")
    let btn1=document.getElementById("btn1")

    const access_key = "uAHe30_wK_2pd0ynTwCdddgE8CidP5nqpiR3yr77YIw";
      let query ="";
      let page=2;
     function get(){
      let url = `https://api.unsplash.com/search/photos?&query=${query}&page=${page}&per_page=20&client_id=${access_key}`;
      fetch(url)
        .then(response => response.json())
        .then(data => {
          images.innerHTML = "";

          data.results.forEach(photo => {
            let img = document.createElement("img");
            img.src = photo.urls.small;
            img.alt = photo.alt_description || "Unsplash Image";
            img.style.backgroundColor="red";
            img.style.width="300px";
            img.style.height="400px";
            img.style.margin = "10px";
            img.style.borderRadius = "10px";


             img.addEventListener("click", () => {
              p1.style.display = "flex";
              p2.src = photo.urls.full;
              
            });
      
          images.appendChild(img);
           });
          })
     
        .catch(error => {
        console.error("Error fetching images:", error);
        });
    };

  form.addEventListener("click", (event) => {
      event.preventDefault()
        query = search.value.trim();
  if (query) {
    get();
    
   btn1.style.display="block"
  }

  })
    p1.addEventListener("click", () => {
      p1.style.display = "none";
    });


  btn1.addEventListener("click",()=>{
  page++
  
  get()

    });
  </script>
</body>
</html>
